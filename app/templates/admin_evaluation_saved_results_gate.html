{% extends "base.html" %}
{% block title %}الدخول إلى إدارة تقييمات الوحدات{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="card auth-card">
    <h1><i class="fa-solid fa-lock fa-icon-title" aria-hidden="true"></i> إدارة تقييمات الوحدات</h1>
    <p class="muted" style="text-align:center;margin-bottom:1rem;">أدخل كلمة مرور حساب <strong>إدارة النظام</strong> للوصول إلى هذه الصفحة.</p>
    {% if gate_error %}
    <p class="form-error-banner" role="alert"><i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i> {{ gate_error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('views.admin_evaluation_saved_results_gate') }}">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div class="form-group">
        <label for="eval-saved-gate-password"><i class="fa-solid fa-key fa-icon-label" aria-hidden="true"></i> كلمة المرور</label>
        <input id="eval-saved-gate-password" name="password" type="password" required autocomplete="current-password" autofocus>
      </div>
      <button class="btn btn-block" type="submit"><i class="fa-solid fa-unlock" aria-hidden="true"></i> دخول</button>
    </form>
    <p class="mt-tight" style="text-align:center;">
      <a class="btn btn-ghost" href="/admin"><i class="fa-solid fa-arrow-right" aria-hidden="true"></i> العودة لإدارة النظام</a>
    </p>
  </div>
</div>
{% endblock %}
